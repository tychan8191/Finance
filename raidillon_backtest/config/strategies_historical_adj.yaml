# Raidillon Capital - Historical Backtest Configuration
# Uses PAST earnings dates for testing the strategy logic

global:
  base_nav: 10000
  currency: USD
  timezone: America/New_York
  commission_per_contract: 0.65
  assignment_fee: 5.00

risk_limits:
  conservative:
    max_position_loss_pct: 0.03
    max_aggregate_premium_pct: 0.10
    circuit_breaker_weekly_drawdown: 0.03
  base:
    max_position_loss_pct: 0.06
    max_aggregate_premium_pct: 0.20
    circuit_breaker_weekly_drawdown: 0.07
  aggressive:
    max_position_loss_pct: 0.075
    max_aggregate_premium_pct: 0.30
    circuit_breaker_weekly_drawdown: 0.09

strategies:

  VIX_VOL_CALL_SPREAD:
    enabled: true
    tier: A
    conviction_score: 86
    theme: volatility_arbitrage
    underlying: VIX
    structure:
      type: debit_call_spread
      expiration_target_dte: 30
      legs:
        long:
          right: C
          strike_selection: fixed
          strike_value: 18
        short:
          right: C
          strike_selection: fixed
          strike_value: 28
    entry_conditions:
      - condition: vix_spot_below
        threshold: 20
    entry_window:
      start: "2024-10-15"
      end: "2024-10-18"
    exit_rules:
      take_profit:
        condition: vix_above
        threshold: 25
        action: exit_all
      time_stop:
        date: "2024-11-15"
        action: close_all
