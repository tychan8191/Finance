    entry_window:
      start: "2026-01-21"
      end: "2026-01-21"
      
    exit_rules:
      monetize:
        condition: spy_down_pct
        threshold: -5
        action: exit_50pct
        then: roll_lower
      expire:
        action: accept_loss
        note: "Insurance cost - expected to lose in base case"
        
