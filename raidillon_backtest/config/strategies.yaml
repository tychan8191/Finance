# Raidillon Capital - Strategy Configuration
# Generated from uploaded deployment documents
# As-Of: January 19, 2026

# =============================================================================
# GLOBAL PARAMETERS
# =============================================================================
global:
  base_nav: 10000
  currency: USD
  timezone: America/New_York
  trading_hours:
    open: "09:30"
    close: "16:00"
  commission_per_contract: 0.65
  assignment_fee: 5.00
  min_open_interest: 500
  max_order_pct_of_oi: 0.10

# =============================================================================
# RISK LIMITS BY VARIANT
# =============================================================================
risk_limits:
  conservative:
    max_position_loss_pct: 0.025  # 2.5% of NAV
    max_aggregate_premium_pct: 0.10  # 10% of NAV
    max_single_theme_pct: 0.15
    min_cash_reserve_pct: 0.55
    circuit_breaker_weekly_drawdown: 0.03
    
  base:
    max_position_loss_pct: 0.04  # 4% of NAV
    max_aggregate_premium_pct: 0.20  # 20% of NAV
    max_single_theme_pct: 0.25
    min_cash_reserve_pct: 0.30
    circuit_breaker_weekly_drawdown: 0.05
    
  aggressive:
    max_position_loss_pct: 0.05  # 5% of NAV
    max_aggregate_premium_pct: 0.30  # 30% of NAV
    max_single_theme_pct: 0.35
    min_cash_reserve_pct: 0.20
    circuit_breaker_weekly_drawdown: 0.07

# =============================================================================
# STRATEGY DEFINITIONS
# =============================================================================
strategies:

  # ---------------------------------------------------------------------------
  # TIER A: HIGH CONVICTION (Score 75+)
  # ---------------------------------------------------------------------------
  
  VIX_VOL_CALL_SPREAD:
    enabled: true
    tier: A
    conviction_score: 86
    theme: volatility_arbitrage
    underlying: VIX
    
    structure:
      type: debit_call_spread
      expiration_target_dte: 30  # ~Feb 19 for Jan entry
      legs:
        long:
          right: C
          strike_selection: fixed
          strike_value: 18  # or use offset from futures
        short:
          right: C
          strike_selection: fixed
          strike_value: 28
    
    entry_conditions:
      - condition: vix_spot_below
        threshold: 17
      - condition: cftc_net_short_above
        threshold: 80000
      - condition: days_to_catalyst_cluster
        min_days: 3
        max_days: 7
        
    entry_window:
      start: "2026-01-21"
      end: "2026-01-24"
      
    catalysts:
      - date: "2026-01-28"
        type: FOMC
        timing: "14:00"
      - date: "2026-01-28"
        type: EARNINGS
        tickers: [MSFT, META, TSLA]
        timing: AMC
      - date: "2026-01-30"
        type: POLICY
        label: Government Shutdown Deadline
        
    exit_rules:
      take_profit:
        condition: vix_above
        threshold: 25
        action: exit_50pct
        then_hold_until: vix_above_28
      time_stop:
        days_after_catalyst: 10
        action: close_all
      kill_switch:
        condition: vix_below_sustained
        threshold: 12
        sustained_days: 2
        action: close_all
        
    position_sizing:
      conservative: 250
      base: 350
      aggressive: 500
      
    notes:
      - "VIX options are European-style, cash-settled at AM SOQ"
      - "Price off futures, not spot VIX"
      - "Contango decay if no vol spike occurs"
      
  # ---------------------------------------------------------------------------
  
  VLO_EARNINGS_CALL_SPREAD:
    enabled: true
    tier: A
    conviction_score: 78
    theme: refiner_venezuela
    underlying: VLO
    
    structure:
      type: debit_call_spread
      expiration_target_dte: 30  # Feb 21
      legs:
        long:
          right: C
          strike_selection: atm_offset
          strike_offset: -3  # Slightly ITM
        short:
          right: C
          strike_selection: atm_offset
          strike_offset: 12  # OTM
    
    strike_override:  # Use if ATM selection doesn't work
      long_strike: 180
      short_strike: 195
      
    entry_conditions:
      - condition: crack_spread_above
        region: USGC
        threshold: 17
      - condition: days_to_earnings
        min_days: 2
        max_days: 7
      - condition: iv_rank_below
        threshold: 50
        
    entry_window:
      start: "2026-01-27"
      end: "2026-01-28"
      
    catalysts:
      - date: "2026-01-29"
        type: EARNINGS
        ticker: VLO
        timing: BMO
        call_time: "10:00"
        
    exit_rules:
      take_profit:
        condition: stock_price_above
        threshold: 190
        action: exit_all
      stop_loss:
        condition: stock_drops_pct
        threshold: -8
        action: exit_all
      time_stop:
        date: "2026-02-14"
        action: close_all
      thesis_invalidation:
        - condition: crack_spread_below
          threshold: 15
          action: close_all
          
    position_sizing:
      conservative: 250
      base: 400
      aggressive: 500
      
    notes:
      - "REJECTED: Burry VLO claim is FALSE per Q3 13F"
      - "BMO earnings - signal generates EOD prior day"
      - "High correlation with MPC (0.92)"
      
